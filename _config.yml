title: Personal Time-series Notes
description: Daily data observations and visualizations.
baseurl: "/qtrade-reports"
url: "https://momo733.github.io"

markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false
  syntax_highlighter: rouge

# GitHub-Pages safe plugins
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

# Exclude noise from build
exclude:
  - README.md
  - .gitignore
  - vendor
  - Gemfile
  - Gemfile.lock

# Render generated chart HTMLs as-is (not via Liquid).
include:
  - "daily-trades/*.html"
keep_files:
  - "assets"
