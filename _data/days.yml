# Hand-maintained alongside daily-trades/*.md.
#
# Drives the home-page TV dashboard (heatmap + screener) and every
# date_picker.html popover, so this file MUST stay in sync with the
# published daily reports — every date with a daily-trades/<d>.md needs
# a row here, and the metrics here MUST agree with that file's front
# matter.
#
# To add a new day, append a new entry below (oldest -> newest) using
# the metrics from the day's daily-trades/<date>.md front matter.
#
# Schema (all keys required, never omit):
#   date              "YYYY-MM-DD"
#   pnl               float (USD)
#   trades            int
#   wins / losses     int
#   breakeven         int
#   win_rate          float (0..1, 4 dp)
#   biggest_win       float (USD, 0 if no wins)
#   biggest_loss      float (USD, <=0; 0 if no losses)
#   max_drawdown_usd  float (USD, <=0; intra-day peak-to-trough)
#   first_entry_et    "HH:MM" or omitted on no-trade days
#   last_exit_et      "HH:MM" or omitted on no-trade days
#   has_chart         bool — true iff daily-trades/<date>-chart.html exists
#
# (TODO: revive scripts/publish_to_reports.py automation so this file is
#  rebuilt from the source-of-truth MDs instead of being hand-edited.)

