    padding: 5px 12px;

  #qt-copy-card button.qt-card-copy {

// Plotly's hover tooltip is non-interactive, so we hook plotly_click on
// the entry / exit / signal traces and pop a sticky card that hosts a real
// Copy button. customdata on each marker is `[title, copyText]`; we never
// touch the click event for any other trace (e.g. candlestick body).
(() => {
  const card = document.getElementById('qt-copy-card');
  if (!card) return;
  const titleEl = card.querySelector('[data-qt-card-title]');
  const textEl = card.querySelector('[data-qt-card-text]');
  const copyBtn = card.querySelector('[data-qt-card-copy]');
  const closeBtn = card.querySelector('[data-qt-card-close]');
  let copyResetTimer = null;

  function show(clientX, clientY, title, text) {
    titleEl.textContent = title;
    textEl.textContent = text;
    card.dataset.copyText = text;
    // Pre-render hidden so we can measure
    card.style.left = '0px';
    card.style.top = '0px';
    card.hidden = false;
    const rect = card.getBoundingClientRect();
    const margin = 8;
    let x = clientX + 12;
    let y = clientY + 12;
    if (x + rect.width + margin > window.innerWidth) x = clientX - rect.width - 12;
    if (y + rect.height + margin > window.innerHeight) y = clientY - rect.height - 12;
    card.style.left = Math.max(margin, x) + 'px';
    card.style.top = Math.max(margin, y) + 'px';
    copyBtn.classList.remove('copied');
    copyBtn.textContent = '复制';
  }
  function hide() {
    card.hidden = true;
    if (copyResetTimer) { clearTimeout(copyResetTimer); copyResetTimer = null; }
  }

  chartDiv.on('plotly_click', (ev) => {
    const pt = ev && ev.points && ev.points[0];
    if (!pt) return;
    const cd = pt.customdata;
    if (!Array.isArray(cd) || cd.length < 2) return;
    const orig = ev.event || {};
    show(orig.clientX || 0, orig.clientY || 0, String(cd[0]), String(cd[1]));
  });

  copyBtn.addEventListener('click', async () => {
    const text = card.dataset.copyText || '';
    let ok = false;
    try {
      await navigator.clipboard.writeText(text);
      ok = true;
    } catch (e) {
      // Fallback for older browsers / iframe sandboxing.
      try {
        const ta = document.createElement('textarea');
        ta.value = text;
        ta.style.position = 'fixed';
        ta.style.left = '-1000px';
        document.body.appendChild(ta);
        ta.select();
        ok = document.execCommand('copy');
        ta.remove();
      } catch (e2) { ok = false; }
    }
    copyBtn.textContent = ok ? '已复制 ✓' : '复制失败';
    copyBtn.classList.toggle('copied', ok);
    if (copyResetTimer) clearTimeout(copyResetTimer);
    copyResetTimer = setTimeout(() => {
      copyBtn.textContent = '复制';
      copyBtn.classList.remove('copied');
    }, 1400);
  });

  closeBtn.addEventListener('click', hide);
  document.addEventListener('keydown', (ev) => { if (ev.key === 'Escape') hide(); });
  // Click-outside to dismiss, but ignore clicks landing back on the
  // chart (that re-opens the card via plotly_click anyway).
  document.addEventListener('click', (ev) => {
    if (card.hidden) return;
    if (card.contains(ev.target)) return;
    if (chartDiv.contains(ev.target)) return;
    hide();
  });
})();
</script>
</body>
</html>
