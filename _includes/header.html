<header class="sticky top-0 z-20 backdrop-blur bg-canvas/85 dark:bg-night-bg/85 border-b border-ink-line dark:border-night-line">
  <div class="max-w-[1400px] mx-auto px-4 sm:px-6 lg:px-8 h-[58px] flex items-center gap-4">
    <a href="{{ '/' | relative_url }}" class="flex items-center gap-2 min-w-0">
      <span class="inline-block w-2 h-6 rounded-sm bg-win"></span>
      <span class="font-semibold tracking-tight truncate">{{ site.title }}</span>
    </a>

    <div class="flex-1"></div>

    <button type="button"
            onclick="window.qtSetTheme(window.qtCurrentTheme() === 'dark' ? 'light' : 'dark')"
            class="inline-flex items-center justify-center w-9 h-9 rounded-md border border-ink-line dark:border-night-line text-ink-soft dark:text-night-soft hover:bg-ink-line/40 dark:hover:bg-night-line/60"
            aria-label="Toggle dark mode">
      <svg class="w-4 h-4 hidden dark:block" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="5"></circle><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"></path></svg>
      <svg class="w-4 h-4 dark:hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
    </button>
  </div>
</header>
