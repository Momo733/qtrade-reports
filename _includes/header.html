<header class="sticky top-0 z-30 backdrop-blur bg-bg/90 dark:bg-night-bg/90 border-b border-line dark:border-night-line">
  <div class="max-w-[1500px] mx-auto px-4 sm:px-6 lg:px-8 h-12 flex items-center gap-6">
    <a href="{{ '/' | relative_url }}" class="flex items-center gap-2 min-w-0 group">
      <span class="relative inline-flex items-center justify-center w-6 h-6 rounded-sm bg-up qt-pulse">
        <svg viewBox="0 0 24 24" class="w-3.5 h-3.5 text-night-bg" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 17 9 11 13 15 21 7"></polyline><polyline points="14 7 21 7 21 14"></polyline></svg>
      </span>
      <span class="font-semibold text-sm tracking-tight text-ink dark:text-night-ink-hi truncate group-hover:text-accent dark:group-hover:text-accent transition-colors">{{ site.title }}</span>
      <span class="hidden sm:inline-block tv-chip ml-1">QQQ · 0DTE</span>
    </a>

    <nav class="hidden sm:flex items-center gap-1 text-xs">
      <a href="{{ '/' | relative_url }}" class="px-2.5 py-1 rounded-sm text-ink-soft dark:text-night-soft hover:text-ink dark:hover:text-night-ink-hi hover:bg-line/60 dark:hover:bg-night-line/80">Overview</a>
      <span class="text-line dark:text-night-line">·</span>
      <a href="{{ '/' | relative_url }}#all-days" class="px-2.5 py-1 rounded-sm text-ink-soft dark:text-night-soft hover:text-ink dark:hover:text-night-ink-hi hover:bg-line/60 dark:hover:bg-night-line/80">All Days</a>
    </nav>

    <div class="flex-1"></div>

    {%- comment -%}
      Calendar popover. The previous <select> based jumper rendered relative
      URLs that 404'd from the home page (and was a poor UX besides). The
      popover always emits absolute URLs via `relative_url`, and lets the
      reader scan a month at a glance with PnL color coding straight from
      `_data/days.yml`.
    {%- endcomment -%}
    {%- assign hdr_days_asc = site.data.days | sort: 'date' -%}
    {%- if hdr_days_asc.size > 0 -%}
      {%- comment -%} Build a list of unique YYYY-MM strings, oldest -> newest. {%- endcomment -%}
      {%- assign months_buf = '' -%}
      {%- for d in hdr_days_asc -%}
        {%- assign ym = d.date | slice: 0, 7 -%}
        {%- unless months_buf contains ym -%}
          {%- assign months_buf = months_buf | append: ym | append: ',' -%}
        {%- endunless -%}
      {%- endfor -%}
      {%- assign months = months_buf | split: ',' | where_exp: 'm', 'm != ""' -%}
      {%- assign latest_ym = months | last -%}

      {%- assign current_date = page.date | default: '' -%}
      {%- if current_date == '' -%}
        {%- assign current_label = 'Jump to date' -%}
      {%- else -%}
        {%- assign current_label = current_date -%}
      {%- endif -%}

      <div id="qt-hdr-cal" class="relative" data-page-date="{{ current_date }}" data-latest-ym="{{ latest_ym }}">
        <button type="button" id="qt-hdr-cal-btn"
                aria-label="Open date picker" aria-expanded="false" aria-haspopup="dialog"
                class="inline-flex items-center gap-1.5 h-7 px-2.5 rounded-sm border border-line dark:border-night-line bg-surface dark:bg-night-surface text-ink dark:text-night-ink-hi hover:border-accent dark:hover:border-accent focus:outline-none focus:border-accent text-xs font-mono">
          <svg aria-hidden="true" class="w-3.5 h-3.5 text-ink-mute dark:text-night-mute" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          <span id="qt-hdr-cal-label">{{ current_label }}</span>
          <svg aria-hidden="true" class="w-3 h-3 text-ink-mute dark:text-night-mute" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
        </button>

        <div id="qt-hdr-cal-pop" role="dialog" aria-label="Date picker"
             class="hidden absolute right-0 top-full mt-1 z-40 w-[19rem] rounded-md border border-line dark:border-night-line bg-surface dark:bg-night-surface shadow-tv dark:shadow-tv-dk p-2">

          <div class="flex items-center justify-between px-1 pb-2 border-b border-line dark:border-night-line">
            <button type="button" id="qt-cal-prev" aria-label="Previous month"
                    class="inline-flex items-center justify-center w-7 h-7 rounded-sm text-ink-mute dark:text-night-mute hover:text-ink dark:hover:text-night-ink-hi hover:bg-line/40 dark:hover:bg-night-line/40 disabled:opacity-30 disabled:pointer-events-none focus:outline-none focus:text-accent">
              <svg aria-hidden="true" class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
            </button>
            <span id="qt-cal-month-label" class="text-xs font-mono font-semibold uppercase tracking-widest text-ink dark:text-night-ink-hi">&nbsp;</span>
            <button type="button" id="qt-cal-next" aria-label="Next month"
                    class="inline-flex items-center justify-center w-7 h-7 rounded-sm text-ink-mute dark:text-night-mute hover:text-ink dark:hover:text-night-ink-hi hover:bg-line/40 dark:hover:bg-night-line/40 disabled:opacity-30 disabled:pointer-events-none focus:outline-none focus:text-accent">
              <svg aria-hidden="true" class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 6 15 12 9 18"/></svg>
            </button>
          </div>

          <div class="grid grid-cols-7 gap-0.5 px-1 pt-2 pb-1 text-[9px] uppercase tracking-widest text-ink-mute dark:text-night-mute text-center">
            <div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div><div>Sun</div>
          </div>

          <div id="qt-cal-months" class="px-1 pb-1">
            {%- for ym in months -%}
              {%- assign first_iso = ym | append: '-01' -%}
              {%- assign first_anchor = first_iso | append: 'T00:00:00Z' -%}
              {%- assign first_ts = first_anchor | date: '%s' | plus: 0 -%}
              {%- assign first_wd = first_anchor | date: '%u' | plus: 0 -%}
              {%- assign offset = first_wd | minus: 1 -%}
              <div class="qt-cal-month grid grid-cols-7 gap-0.5" data-ym="{{ ym }}" hidden>
                {%- for i in (1..6) -%}
                  {%- if i <= offset -%}<div class="h-7"></div>{%- endif -%}
                {%- endfor -%}
                {%- for day in (1..31) -%}
                  {%- assign secs = day | minus: 1 | times: 86400 -%}
                  {%- assign cell_ts = first_ts | plus: secs -%}
                  {%- assign cell_ym = cell_ts | date: '%Y-%m' -%}
                  {%- if cell_ym == ym -%}
                    {%- assign cell_date = cell_ts | date: '%Y-%m-%d' -%}
                    {%- assign cell_wd = cell_ts | date: '%u' | plus: 0 -%}
                    {%- assign matched = hdr_days_asc | where: 'date', cell_date | first -%}
                    {%- if matched -%}
                      {%- if matched.pnl > 0 -%}
                        {%- assign cell_klass = 'bg-up/15 text-up dark:bg-up/20 hover:bg-up/30' -%}
                      {%- elsif matched.pnl < 0 -%}
                        {%- assign cell_klass = 'bg-down/15 text-down dark:bg-down/20 hover:bg-down/30' -%}
                      {%- else -%}
                        {%- assign cell_klass = 'bg-line/60 text-ink-soft dark:bg-night-line/70 dark:text-night-soft hover:bg-line dark:hover:bg-night-line' -%}
                      {%- endif -%}
                      {%- assign is_current = false -%}
                      {%- if cell_date == current_date -%}{%- assign is_current = true -%}{%- endif -%}
                      <a href="{{ '/daily-trades/' | append: cell_date | append: '.html' | relative_url }}"
                         data-date="{{ cell_date }}"
                         title="{{ cell_date }} · {% if matched.pnl > 0 %}+{% endif %}{{ matched.pnl }} USD · {{ matched.trades }} trades"
                         class="qt-cal-day h-7 flex items-center justify-center rounded-sm text-[11px] font-mono leading-none cursor-pointer transition-colors {{ cell_klass }}{% if is_current %} ring-2 ring-accent ring-offset-1 ring-offset-surface dark:ring-offset-night-surface font-semibold{% endif %}">{{ day }}</a>
                    {%- else -%}
                      <div class="h-7 flex items-center justify-center rounded-sm text-[11px] font-mono leading-none text-ink-mute/40 dark:text-night-mute/40{% if cell_wd > 5 %} opacity-50{% endif %}">{{ day }}</div>
                    {%- endif -%}
                  {%- endif -%}
                {%- endfor -%}
              </div>
            {%- endfor -%}
          </div>

          <div class="border-t border-line dark:border-night-line mt-1 pt-1.5 px-1 text-[10px] text-ink-mute dark:text-night-mute font-mono flex items-center justify-between">
            <span class="flex items-center gap-1">
              <span class="inline-block w-2 h-2 rounded-sm bg-up/40"></span><span>win</span>
              <span class="inline-block w-2 h-2 rounded-sm bg-down/40 ml-1"></span><span>loss</span>
            </span>
            <span class="hidden sm:inline">Esc to close</span>
          </div>
        </div>
      </div>
    {%- endif -%}

    <a href="https://github.com/momo733/qtrade-reports" target="_blank" rel="noopener"
       class="hidden sm:inline-flex items-center justify-center w-8 h-8 rounded-sm text-ink-mute dark:text-night-mute hover:text-ink dark:hover:text-night-ink-hi hover:bg-line/60 dark:hover:bg-night-line/80"
       title="Source">
      <svg class="w-4 h-4" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 .5C5.65.5.5 5.65.5 12c0 5.08 3.29 9.39 7.86 10.91.58.1.79-.25.79-.56v-2c-3.2.7-3.87-1.36-3.87-1.36-.52-1.31-1.27-1.66-1.27-1.66-1.04-.71.08-.7.08-.7 1.15.08 1.76 1.18 1.76 1.18 1.02 1.75 2.68 1.25 3.34.96.1-.74.4-1.25.72-1.54-2.55-.29-5.24-1.28-5.24-5.69 0-1.26.45-2.28 1.18-3.08-.12-.29-.51-1.46.11-3.04 0 0 .97-.31 3.18 1.18a11 11 0 015.79 0c2.21-1.49 3.18-1.18 3.18-1.18.62 1.58.23 2.75.11 3.04.73.8 1.18 1.82 1.18 3.08 0 4.42-2.69 5.4-5.25 5.68.41.36.78 1.06.78 2.14v3.17c0 .31.21.67.8.56C20.21 21.38 23.5 17.07 23.5 12 23.5 5.65 18.35.5 12 .5z"/></svg>
    </a>

    <button type="button"
            onclick="window.qtSetTheme(window.qtCurrentTheme() === 'dark' ? 'light' : 'dark')"
            class="inline-flex items-center justify-center w-8 h-8 rounded-sm text-ink-mute dark:text-night-mute hover:text-ink dark:hover:text-night-ink-hi hover:bg-line/60 dark:hover:bg-night-line/80"
            aria-label="Toggle dark mode">
      <svg class="w-4 h-4 hidden dark:block" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="5"></circle><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"></path></svg>
      <svg class="w-4 h-4 dark:hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
    </button>
  </div>
</header>
